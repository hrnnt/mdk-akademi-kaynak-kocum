        const App = () => {
            const [selectedExam, setSelectedExam] = useState('YKS');
            const [activeTab, setActiveTab] = useState('soru_bankalari');
            const [searchTerm, setSearchTerm] = useState('');
            const [filterSeviye, setFilterSeviye] = useState('Hepsi');

            useEffect(() => {
                lucide.createIcons();
            }, [selectedExam, activeTab, filterSeviye, searchTerm]);

            const navItems = [
                { id: 'soru_bankalari', icon: 'book-open', label: 'Kitaplar' },
                { id: 'youtube_kanallari', icon: 'youtube', label: 'Kanallar' },
                { id: 'denemeler', icon: 'layers', label: 'Deneme' },
                { id: 'okuma_listesi', icon: 'library-big', label: 'Okuma' },
                { id: 'net_bazli', icon: 'bar-chart-3', label: 'Netler' },
                { id: 'nokta_atis', icon: 'target', label: 'Nokta Atış' }
            ];

            const getSeviyeColor = (seviye) => {
                const s = seviye.toLowerCase();
                if (s.includes('başlangıç') || s.includes('0-5')) return 'bg-emerald-100 text-emerald-700 border-emerald-200';
                if (s.includes('kolay')) return 'bg-cyan-100 text-cyan-700 border-cyan-200';
                if (s.includes('orta')) return 'bg-amber-100 text-amber-700 border-amber-200';
                if (s.includes('zor') || s.includes('ileri')) return 'bg-rose-100 text-rose-700 border-rose-200';
                return 'bg-sky-100 text-sky-700 border-sky-200';
            };

            const filteredData = useMemo(() => {
                const data = MDK_DATA[selectedExam][activeTab] || [];
                return data.filter(item => {
                    const matchesSeviye = filterSeviye === 'Hepsi' || 
                                         (item.seviye && item.seviye.toLowerCase().includes(filterSeviye.toLowerCase()));
                    const term = searchTerm.toLowerCase();
                    const matchesSearch = 
                        (item.ders?.toLowerCase().includes(term)) || 
                        (item.tip?.toLowerCase().includes(term)) ||
                        (item.baslik?.toLowerCase().includes(term)) ||
                        (item.kaynaklar?.some(k => k.toLowerCase().includes(term))) ||
                        (item.kanallar?.some(k => k.toLowerCase().includes(term))) ||
                        (item.liste?.some(k => k.toLowerCase().includes(term))) ||
                        (item.icerik?.some(k => k.toLowerCase().includes(term)));
                    
                    return matchesSeviye && matchesSearch;
                });

                                        </div>
                                    </div>
                                    <div className="flex bg-slate-900/10 p-1 rounded-xl backdrop-blur-sm shrink-0">

                                            <button
                                                key={exam}
                                                onClick={() => { setSelectedExam(exam); setFilterSeviye('Hepsi'); setActiveTab('soru_bankalari'); }}
                                                className={`px-6 py-1.5 rounded-lg font-black transition-all text-xs ${
                                                    selectedExam === exam ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-800/60'
                                                }`}
                                            >
                                                {exam}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="relative group">
                                    <Icon name="search" className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                                    <input 
                                        type="text"
                                        placeholder="KİTAP, HOCA VEYA DENEME ARA..."
                                        className="w-full pl-10 pr-4 py-2.5 rounded-xl border-none shadow-inner bg-white focus:bg-white focus:ring-4 focus:ring-yellow-600/10 transition-all text-sm font-bold placeholder:text-slate-300 uppercase"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-3 mt-6">
                        <div className="grid grid-cols-3 md:grid-cols-6 gap-2 mb-6">
                            {navItems.map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex flex-col items-center justify-center gap-1.5 p-3 rounded-xl font-black transition-all border-2 relative overflow-hidden group ${
                                        activeTab === tab.id 
                                        ? 'bg-slate-900 text-white border-slate-900 shadow-md' 
                                        : 'bg-white text-slate-400 border-white hover:border-slate-100 shadow-sm'
                                    }`}
                                >
                                    <Icon name={tab.icon} className={activeTab === tab.id ? 'text-yellow-400' : 'text-slate-300'} size={20} />
                                    <span className="text-[9px] uppercase tracking-tighter relative z-10 text-center leading-none">{tab.label}</span>
                                    {activeTab === tab.id && <div className="absolute inset-0 bg-gradient-to-br from-slate-800 to-slate-900 opacity-60" />}
                                </button>
                            ))}
                        </div>

                        <div className="flex flex-wrap items-center gap-1.5 mb-6 bg-white/50 p-2 rounded-xl border border-slate-100 shadow-sm">
                            <div className="flex items-center gap-1.5 text-slate-400 font-black uppercase text-[8px] shrink-0 bg-white px-2 py-1 rounded-md border border-slate-100">
                                <Icon name="filter" size={12} />
                                <span>Filtre</span>
                            </div>
                            {['Hepsi', 'Başlangıç', 'Kolay', 'Orta', 'Zor'].map((lvl) => (
                                <button
                                    key={lvl}
                                    onClick={() => setFilterSeviye(lvl)}
                                    className={`px-3.5 py-1.5 rounded-lg text-[10px] font-black transition-all uppercase tracking-wider ${
                                        filterSeviye === lvl 
                                        ? 'bg-yellow-400 text-slate-900 shadow-sm' 
                                        : 'bg-white text-slate-400 border border-slate-100'
                                    }`}
                                >
                                    {lvl}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            {filteredData.length > 0 ? (
                                filteredData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl border border-slate-50 shadow-sm hover:shadow-md transition-all duration-300 group flex flex-col"
                                    >
                                        <div className="p-4 border-b border-slate-50 bg-slate-50/20 flex justify-between items-start">
                                            <div>
                                                <h3 className="text-sm font-black text-slate-900 uppercase tracking-tight mb-1 leading-tight">
                                                    {item.ders || item.tip || item.baslik}
                                                </h3>
                                                {item.seviye && (
                                                    <div className={`inline-flex px-2 py-1 rounded-md text-[8px] font-black border uppercase tracking-widest shadow-sm ${getSeviyeColor(item.seviye)}`}>
                                                        {item.seviye}
                                                    </div>
                                                )}
                                            </div>
                                            <div className="bg-white p-2 rounded-xl shadow-sm text-yellow-500 border border-slate-50 shrink-0">
                                                <Icon name={activeTab === 'youtube_kanallari' ? 'youtube' : (activeTab === 'okuma_listesi' ? 'library-big' : 'star')} size={16} />
                                            </div>
                                        </div>
                                        <div className="p-4 flex-grow bg-white rounded-b-2xl">
                                            <div className="space-y-3">
                                                {(item.kaynaklar || item.kanallar || item.liste || item.icerik).map((val, i) => (
                                                    <div key={i} className="flex items-start gap-3">
                                                        <div className="mt-1.5 w-1.5 h-1.5 rounded-full bg-yellow-400 shrink-0" />
                                                        <span className="text-slate-800 font-bold text-xs leading-tight tracking-tight uppercase">
                                                            {val}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <div className="col-span-full py-16 text-center bg-white rounded-3xl border-2 border-dashed border-slate-100 shadow-inner">
                                    <Icon name="search" className="mx-auto mb-4 text-slate-200" size={32} />
                                    <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest px-4">ARADIĞIN KRİTERDE İÇERİK BULUNAMADI.</p>
                                </div>
